<!DOCTYPE html>
<html lang="en">
<head>
<title>O Catolicismo em sua Mão</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
  }

body {
  font-family: Arial, Helvetica, sans-serif;
	}

/* Style the header */
header 
	{
  background-color: rgb(233, 211, 168);
  padding: 30px;
  text-align: center;
  font-size: 32px;
  font-family: 'Times New Roman', Times, serif, Times, serif;;
	}

/* Create two columns/boxes that floats next to each other */
nav 
	{
  float: left;
  width: 25%;
  background: #aaa399;
  padding: 20px;
  height: 660px;
	}

/* Style the list inside the menu */
nav ul 
	{
  list-style-type: none;
  padding: 0;
	}

article {
  float:left;
  padding: 20px;
  width: 75%;
  height: 660px;
  background-color: #f1f1f1;
}

/* NOVO: Estilo para o iframe dentro do article */
article iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Clear floats after the columns */
section::after {
  content: "";
  display: table;
  clear: both;
}

/* Style the footer */
footer {
  background-color: #777;
  padding: 10px;
  text-align: center;
  color: white;
}

/* Responsive layout - makes the two columns/boxes stack on top of each other instead of next to each other, on small screens */
@media (max-width: 600px) {
  nav, article {
    width: 100%;
    height: auto;
  }
}
</style>
</head>
<body>

<header>
  <h2>Catolicismo</h2>
</header>

<section> 
  <nav>

    <ul>

      <li><a href="https://formacao.cancaonova.com/igreja/doutrina/o-que-e-a-tradicao-da-igreja/" target="conteudo-pilar">Tradição</a></li>
      <li><a href="https://www.cnbb.org.br/o-magisterio-da-igreja/" target="conteudo-pilar">Magistério</a></li>
    <h1>A Razão da Nossa Fé</h1>
        <li>O mistério da Trindade</li>
        <li>A Igreja edificada por Deus</li>
        <li>A comunhão dos Santos</li>
        <li>A remissão dos pecados</li>
        <li>A Ressusrreição para uma nova Vida</li>
      </ul>
  </nav>
  
  <article>
      <iframe name="conteudo-pilar" src="about:blank"></iframe>
  </article>

</section>

<footer>
  <p>Footer</p>
</footer>

</body>
</html>
